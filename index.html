<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cabinet Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Controls -->
        <div class="sidebar">
            <h2>3D Cabinet Designer</h2>
            
            <div class="settings-panel">
                <h3>Global Dimensions (mm)</h3>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Total Height</label>
                        <input type="number" id="height" value="2200" oninput="calculateCabinetSetup()">
                    </div>
                    <div class="input-group">
                        <label>Total Depth</label>
                        <input type="number" id="depth" value="600" oninput="calculateCabinetSetup()">
                    </div>
                </div>

                <div class="input-grid">
                    <div class="input-group">
                        <label>Board Thickness</label>
                        <input type="number" id="thickness" value="16" oninput="calculateCabinetSetup()">
                    </div>
                    <div class="input-group">
                        <label>Kickplate Height</label>
                        <input type="number" id="kickHeight" value="100" oninput="calculateCabinetSetup()">
                    </div>
                </div>

                <div class="input-grid">
                    <div class="input-group">
                        <label>Top Track/Fascia</label>
                        <input type="number" id="topTrack" value="0" oninput="calculateCabinetSetup()">
                    </div>
                    <div class="input-group">
                        <label>Exposed Ends</label>
                        <select id="exposedSides" onchange="calculateCabinetSetup()">
                            <option value="both">Both Sides</option>
                            <option value="left">Left Side Only</option>
                            <option value="right">Right Side Only</option>
                            <option value="none">None (Built-in)</option>
                        </select>
                    </div>
                </div>

                <h3>Materials & Finishes</h3>
                <div class="input-group">
                    <label>Carcass (Interior)</label>
                    <select id="carcassMaterial" onchange="calculateCabinetSetup()">
                        <option value="White Melamine Peen">White Melamine Peen (16mm)</option>
                        <option value="Folkstone Grey">Folkstone Grey (16mm)</option>
                        <option value="Storm Grey">Storm Grey (16mm)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Facings (Doors/Drawers)</label>
                    <select id="faceMaterial" onchange="calculateCabinetSetup()">
                        <option value="Kara Blu">Kara Blu (Melawood)</option>
                        <option value="Petrol Blue">Petrol Blue (Melawood)</option>
                        <option value="Super Black">Super Black (Melawood)</option>
                        <option value="Iceberg White">Iceberg White (Melawood)</option>
                    </select>
                </div>

                <div class="input-grid">
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Backing Board Material</label>
                        <select id="backMaterial" onchange="syncBackingThickness()">
                            <option value="White Melamine Back" data-thick="16">Melamine Backing (16mm)</option>
                            <option value="Masonite Back" data-thick="3">Masonite Backing (3mm)</option>
                        </select>
                    </div>
                    <div class="input-group" style="display:none;">
                        <label>Backing (mm)</label>
                        <input type="number" id="backThickness" value="16" readonly oninput="calculateCabinetSetup()">
                    </div>
                </div>

                <h3>Style & Aesthetics</h3>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Door Style</label>
                        <select id="doorStyle" onchange="calculateCabinetSetup()">
                            <option value="flat">Flat / Slab</option>
                            <option value="shaker">Shaker-Style</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Handles / Opening</label>
                        <select id="handleStyle" onchange="calculateCabinetSetup()">
                            <option value="none">Push-to-Open (No Handles)</option>
                            <option value="gola">Gola Profile (Integrated)</option>
                            <option value="bar-black">Modern Black Pull Handles</option>
                            <option value="bar-silver">Classic Silver T-Bar Handles</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr>

            <div class="modules-header">
                <h3>Modular Units Setup</h3>
                <button class="btn-add" onclick="addNewModule()">+ Add Unit</button>
            </div>
            
            <div id="modular-warning" style="display:none; color: red; font-size: 12px; margin-bottom: 10px;">
                * Note: Individual unit widths capped at 1000mm.
            </div>

            <div id="modules-list">
                <!-- Modules list renders here dynamically -->
            </div>
        </div>

        <!-- Right Side Viewport & Output Tables -->
        <div class="main-content">
            <div class="viewport-header">
                <span class="viewport-title">3D Visual Preview (Drag to Rotate)</span>
                <span id="viewport-badge" class="badge">0 Units</span>
            </div>

            <div id="canvas-viewport">
                <div id="stage" style="transform: rotateX(-15deg) rotateY(-20deg);">
                    <!-- 3D panels dynamically render here -->
                </div>
            </div>

            <div class="cutting-list-container">
                <h2>Carcass & Door Cutting List (MaxiCut Ready)</h2>
                <div id="lists-output">
                    <!-- Cutlist tables will generate here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
