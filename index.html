<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDESIGN - Modular Cabinet Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <div class="sidebar">
            <h2>iDESIGN</h2>
            
            <h3>Global Dimensions</h3>
            <div class="input-grid">
                <div class="input-group">
                    <label>Height (mm)</label>
                    <input type="number" id="height" value="2000" oninput="calculateCabinetSetup()">
                </div>
                <div class="input-group">
                    <label>Depth (mm)</label>
                    <input type="number" id="depth" value="600" oninput="calculateCabinetSetup()">
                </div>
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>Board Thickness (mm)</label>
                    <input type="number" id="thickness" value="16" oninput="calculateCabinetSetup()">
                </div>
                <div class="input-group">
                    <label>Kickplate Height (mm)</label>
                    <input type="number" id="kickHeight" value="100" oninput="calculateCabinetSetup()">
                </div>
            </div>

            <input type="hidden" id="topTrack" value="0">

            <h3>Materials (PG Bison Melawood)</h3>
            <div class="input-group" style="margin-bottom: 12px;">
                <label>Carcass Material</label>
                <select id="carcassMaterial" onchange="calculateCabinetSetup()">
                    <optgroup label="Solid Colours">
                        <option value="White Melamine Peen" selected>White Melamine Peen</option>
                        <option value="Iceberg White">Iceberg White</option>
                        <option value="Folkstone Grey">Folkstone Grey</option>
                        <option value="Storm Grey">Storm Grey</option>
                        <option value="Super Black">Super Black</option>
                        <option value="Dunblane Grey">Dunblane Grey</option>
                    </optgroup>
                    <optgroup label="Accent Range">
                        <option value="Kara Blu">Kara Blu</option>
                        <option value="Petrol Blue">Petrol Blue</option>
                        <option value="Cappuccino">Cappuccino</option>
                        <option value="Congo">Congo</option>
                    </optgroup>
                    <optgroup label="Woodgrains">
                        <option value="Coimbra">Coimbra</option>
                        <option value="Esperanza Oak">Esperanza Oak</option>
                        <option value="Lanza Oak">Lanza Oak</option>
                        <option value="Monument Oak">Monument Oak</option>
                        <option value="Verzasca Oak">Verzasca Oak</option>
                        <option value="Arden">Arden</option>
                        <option value="Vardo">Vardo</option>
                        <option value="Camden">Camden</option>
                        <option value="Greythorne">Greythorne</option>
                        <option value="Brookhill">Brookhill</option>
                        <option value="American Walnut">American Walnut</option>
                        <option value="Natural Oak">Natural Oak</option>
                        <option value="Windsor Cherry">Windsor Cherry</option>
                    </optgroup>
                </select>
            </div>

            <div class="input-group" style="margin-bottom: 12px;">
                <label>Door & Front Material</label>
                <select id="faceMaterial" onchange="calculateCabinetSetup()">
                    <optgroup label="Solid Colours">
                        <option value="White Melamine Peen">White Melamine Peen</option>
                        <option value="Iceberg White">Iceberg White</option>
                        <option value="Folkstone Grey">Folkstone Grey</option>
                        <option value="Storm Grey">Storm Grey</option>
                        <option value="Super Black" selected>Super Black</option>
                        <option value="Dunblane Grey">Dunblane Grey</option>
                    </optgroup>
                    <optgroup label="Accent Range">
                        <option value="Kara Blu">Kara Blu</option>
                        <option value="Petrol Blue">Petrol Blue</option>
                        <option value="Cappuccino">Cappuccino</option>
                        <option value="Congo">Congo</option>
                    </optgroup>
                    <optgroup label="Woodgrains">
                        <option value="Coimbra">Coimbra</option>
                        <option value="Esperanza Oak">Esperanza Oak</option>
                        <option value="Lanza Oak">Lanza Oak</option>
                        <option value="Monument Oak">Monument Oak</option>
                        <option value="Verzasca Oak">Verzasca Oak</option>
                        <option value="Arden">Arden</option>
                        <option value="Vardo">Vardo</option>
                        <option value="Camden">Camden</option>
                        <option value="Greythorne">Greythorne</option>
                        <option value="Brookhill">Brookhill</option>
                        <option value="American Walnut">American Walnut</option>
                        <option value="Natural Oak">Natural Oak</option>
                        <option value="Windsor Cherry">Windsor Cherry</option>
                    </optgroup>
                </select>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Backing Material</label>
                    <select id="backMaterial" onchange="syncBackingThickness()">
                        <option value="White Melamine Peen" data-thick="16" selected>White Melamine (16mm)</option>
                        <option value="Iceberg White" data-thick="9">Iceberg White Melamine (9mm)</option>
                        <option value="Folkstone Grey" data-thick="9">Folkstone Grey Melamine (9mm)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Back Thickness (mm)</label>
                    <input type="number" id="backThickness" value="16" readonly>
                </div>
            </div>

            <div class="modules-header">
                <h3>Modular Units</h3>
                <button class="btn-add" onclick="addNewModule()">+ Add Unit</button>
            </div>
            
            <div id="modules-list"></div>

            <div id="modular-warning" style="display: none; color: #ef4444; font-size: 12px; margin-top: 10px; font-weight: bold;">
                ⚠️ Warning: One of your modules exceeds 1000mm width.
            </div>
        </div>

        <!-- Main Workspace Area -->
        <div class="main-content">
            <div class="viewport-header">
                <span id="viewport-badge" class="badge">0 Unit(s) Loaded</span>
            </div>

            <div id="canvas-viewport">
                <div id="stage"></div>
            </div>

            <div class="cutting-list-container">
                <h2 style="border-bottom: 2px solid #10b981;">Carcass & Door Cutting List (MaxiCut Ready)</h2>
                <div id="lists-output"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
