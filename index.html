<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cabinet Configurator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Controls -->
        <div class="sidebar">
            <h2>Global Dimensions (mm)</h2>
            <div class="input-grid">
                <div class="input-group">
                    <label>Total Height</label>
                    <input type="number" id="height" value="2000">
                </div>
                <div class="input-group">
                    <label>Total Depth</label>
                    <input type="number" id="depth" value="600">
                </div>
            </div>
            <div class="input-grid">
                <div class="input-group">
                    <label>Carcass Thickness</label>
                    <input type="number" id="thickness" value="16">
                </div>
                <div class="input-group">
                    <label>Floor Kick Height</label>
                    <input type="number" id="kickHeight" value="100">
                </div>
            </div>

            <hr>

            <h2>Material Specifications</h2>
            <div class="input-group">
                <label>Carcass Finish</label>
                <select id="carcassMaterial">
                    <option value="White Melamine Peen" selected>White Melamine Peen</option>
                    <option value="Folkstone Grey">Folkstone Grey Peen</option>
                </select>
            </div>
            <div class="input-group">
                <label>Facings / Doors Finish</label>
                <select id="faceMaterial">
                    <option value="Super Black" selected>Melawood Super Black</option>
                    <option value="Iceberg White">Melawood Iceberg White</option>
                </select>
            </div>
            <div class="input-group">
                <label>Backing Board Material</label>
                <select id="backMaterial">
                    <option value="White Melamine Peen" data-thick="16" selected>White Melamine (16mm)</option>
                    <option value="Iceberg White" data-thick="9">Iceberg White Melamine (9mm)</option>
                    <option value="Standard Masonite" data-thick="3">Standard Masonite (3mm)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Backing Thickness (mm)</label>
                <input type="number" id="backThickness" value="16">
            </div>

            <hr>

            <h2>Structure Options</h2>
            <div class="input-group">
                <label>Exposed Decorative Sides</label>
                <select id="exposedPanels">
                    <option value="none" selected>None (Fully Built-In)</option>
                    <option value="left">Left Side Exposed</option>
                    <option value="right">Right Side Exposed</option>
                    <option value="both">Both Sides Exposed</option>
                </select>
            </div>
            <div class="input-group">
                <label>Front Plinth Style</label>
                <select id="plinthMaterial">
                    <option value="matching" selected>Matching Wooden Plinth</option>
                    <option value="silver-alum">Brushed Silver Aluminium</option>
                    <option value="black-alum">Matt Black Aluminium</option>
                </select>
            </div>

            <hr>

            <div class="modules-section-header">
                <h2>Modular Layout Units</h2>
                <button class="btn-add" id="add-unit-btn">Add Unit</button>
            </div>
            
            <div id="modules-list">
                <!-- Dynamically injected units -->
            </div>
            
            <button class="btn-primary" id="generate-btn" style="margin-top: 20px; width: 100%;">Calculate & Render Structure</button>
        </div>

        <!-- Main Display Arena -->
        <div class="main-content">
            <div class="viewport-card">
                <div class="viewport-header">
                    <span>3D Interactive Matrix Preview</span>
                    <span class="badge" id="viewport-badge">1 Unit Active</span>
                </div>
                <div id="canvas-viewport" class="canvas-viewport">
                    <div id="stage" class="stage"></div>
                </div>
                <div class="helper-text">Click and drag inside viewport to orbit view layout</div>
            </div>

            <!-- Cutting List Outputs -->
            <div class="list-card">
                <h2>Fabrication Cutting List Specs</h2>
                <div id="lists-output">
                    <!-- Tables injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
